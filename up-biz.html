<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoScale – חוו אוטומציה עכשיו</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #04101E; --glass: rgba(90,154,255,0.07); --border: rgba(255,255,255,0.14);
      --shimmer: rgba(255,255,255,0.30); --acc: #5B9CFF; --acc-b: #90BFFF;
      --white: #FFFFFF; --sec: #7FAACC; --dim: #1E3550;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 20px; position: relative; }
    body::before { content: ''; position: fixed; top: -20%; right: -15%; width: 65%; height: 70%;
      background: radial-gradient(ellipse, rgba(16,60,180,0.16) 0%, transparent 70%);
      pointer-events: none; z-index: 0; }
    body::after  { content: ''; position: fixed; bottom: -25%; left: -15%; width: 55%; height: 65%;
      background: radial-gradient(ellipse, rgba(8,30,80,0.20) 0%, transparent 70%);
      pointer-events: none; z-index: 0; }

    .logo { font-size: 11px; letter-spacing: 0.14em; color: var(--acc);
      text-align: center; margin-bottom: 36px; position: relative; z-index: 1; }

    .card { position: relative; z-index: 1; width: 100%; max-width: 420px;
      background: var(--glass); border: 0.5px solid var(--border); border-radius: 20px;
      padding: 44px 36px 40px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .card::before { content: ''; position: absolute; top: 5px; left: 14%; right: 14%;
      height: 1px; background: var(--shimmer); border-radius: 1px; }
    .card::after  { content: ''; position: absolute; top: 8%; bottom: 8%; right: 5px;
      width: 1px; background: linear-gradient(to bottom, rgba(255,255,255,0.20),
      transparent 50%, rgba(255,255,255,0.05)); }

    .group-badge { display: flex; align-items: center; justify-content: center; gap: 7px;
      background: rgba(91,156,255,0.12); border: 0.5px solid rgba(91,156,255,0.28);
      border-radius: 30px; padding: 7px 16px; font-size: 13px; color: var(--acc-b); margin-bottom: 28px; }

    h1 { font-size: 32px; font-weight: 700; line-height: 1.25; text-align: center; margin-bottom: 8px; }
    h1 span { color: var(--acc); }
    .sub { font-size: 16px; color: var(--sec); text-align: center; line-height: 1.6; margin-bottom: 34px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--sec); margin-bottom: 7px; letter-spacing: 0.03em; }

    input[type="text"], input[type="tel"] {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.14); border-radius: 12px;
      padding: 15px 18px; font-size: 16px; color: var(--white); outline: none;
      transition: border-color 0.2s, background 0.2s; font-family: inherit;
      text-align: right; -webkit-appearance: none; }
    input::placeholder { color: rgba(255,255,255,0.22); }
    input:focus { border-color: rgba(91,156,255,0.44); background: rgba(91,156,255,0.06); }

    .btn { width: 100%; margin-top: 24px; background: #1A73E8; border: none;
      border-radius: 14px; padding: 17px; font-size: 17px; font-weight: 600;
      color: #fff; cursor: pointer; font-family: inherit;
      transition: opacity 0.2s, transform 0.12s; position: relative; overflow: hidden; }
    .btn::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%;
      height: 1px; background: rgba(255,255,255,0.28); }
    .btn:hover  { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.42; cursor: default; transform: none; }

    #success { display: none; text-align: center; padding: 12px 0; }
    #success .icon { font-size: 56px; margin-bottom: 18px; display: block; }
    #success h2 { font-size: 24px; margin-bottom: 10px; }
    #success p { color: var(--sec); font-size: 16px; line-height: 1.7; }
    #success .note { margin-top: 22px; font-size: 13px; color: var(--acc);
      padding: 11px 18px; background: rgba(91,156,255,0.10);
      border-radius: 10px; border: 0.5px solid rgba(91,156,255,0.2); }

    .footer { margin-top: 26px; font-size: 11px; color: var(--dim);
      letter-spacing: 0.08em; text-align: center; position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="logo">AUTOSCALE</div>

  <div class="card">
    <div id="form-section">
      <div class="group-badge">⚡ מיוחד לחברי קבוצת Up – לעסקים</div>
      <h1>חוו <span>אוטומציה</span><br>עכשיו</h1>
      <p class="sub">מלאו שם ומספר טלפון.<br>ראו מה קורה תוך 30 שניות.</p>

      <div class="field">
        <label>שם פרטי</label>
        <input type="text" id="firstName" placeholder="הכניסו את שמכם"
               autocomplete="given-name" inputmode="text">
      </div>

      <div class="field">
        <label>מספר טלפון</label>
        <input type="tel" id="phone" placeholder="05X-XXXXXXX"
               autocomplete="tel" inputmode="tel">
      </div>

      <button class="btn" id="submit-btn" onclick="send()">שליחה ←</button>
    </div>

    <div id="success">
      <span class="icon">📲</span>
      <h2>בדרך אליך</h2>
      <p>תוך שניות ספורות<br>תקבלו הודעת ווצאפ.</p>
      <div class="note">זו לא הבטחה. זו הדגמה בזמן אמת.</div>
    </div>
  </div>

  <div class="footer">autoscalehq.io</div>

  <script>
    async function send() {
      const name  = document.getElementById('firstName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if (!name)  { document.getElementById('firstName').focus(); return; }
      if (!phone) { document.getElementById('phone').focus();     return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = 'שולח...';

      const payload = {
        timestamp: new Date().toISOString(),
        type:      'אחרי שיחה',
        name:      name,
        phone:     phone,
      };

      try {
        await fetch('https://hook.eu1.make.com/w9giggm11dd63tjqgf2gmqfnhgeva9gs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (_) {}

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success').style.display      = 'block';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  </script>
</body>
</html>
